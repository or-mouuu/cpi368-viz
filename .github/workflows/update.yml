name: Update data and deploy

on:
  push:
    branches: [main]
  schedule:
    # 10th of every month, 03:00 UTC (~11:00 Taipei) - after DGBAS's monthly
    # CPI release (typically the 5th-8th)
    - cron: '0 3 10 * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Fetch latest CPI data
        run: python pipeline/fetch.py

      - name: Build items.json
        run: python pipeline/build_data.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- public/data/items.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/items.json
          git commit -m "chore: update CPI data $(date -u +%Y-%m)"
          git push

  build-and-deploy:
    needs: update-data
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
